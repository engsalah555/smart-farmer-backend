        content: '{"data":[{"id":1,"scientific_name":"Sorghum bicolor","common_name":"\u0627\u0644\u0630\u0631\u0629 \u0627\u0644\u0631\u0641\u064a\u0639\u0629","description":"\u0646\u0628\u0627\u062a \u062d\u0628\u0648\u0628 \u0633\u0646\u0648\u064a \u0645\u0642\u0627\u0648\u0645 \u0644\u0644\u062c\u0641\u0627\u0641\u060c \u064a\u064f\u0632\u0631\u0639 \u0628\u0643\u062b\u0631\u0629 \u0641\u064a \u0627\u0644\u0645\u0631\u062a\u0641\u0639\u0627\u062a \u0648\u0627\u0644\u0645\u0646\u0627\u0637\u0642 \u0627\u0644\u062c\u0627\u0641\u0629 \u0641\u064a \u0627\u0644\u064a\u0645\u0646.","benefits":"\u0645\u0635\u062f\u0631 \u063a\u0646\u064a \u0628\u0627\u0644\u0643\u0631\u0628\u0648\u0647\u064a\u062f\u0631\u0627\u062a \u0648\u0627\u0644\u0628\u0631\u0648\u062a\u064a\u0646 \u0648\u0627\u0644\u0623\u0644\u064a\u0627\u0641. \u064a\u0633\u062a\u062e\u062f\u0645 \u0627\u0644\u0633\u064a\u0642\u0627\u0646 \u0627\u0644\u062e\u0636\u0631\u0627\u0621 \u0643\u0639\u0644\u0641 \u0644\u0644\u0645\u0627\u0634\u064a\u0629.","growth_guide":"\u0627\u0644\u062a\u0639\u0631\u064a\u0641 \u0627\u0644\u0639\u0644\u0645\u064a: \u0646\u0628\u0627\u062a \u0639\u0634\u0628\u064a \u062d\u0648\u0644\u064a \u0645\u0646 \u0627\u0644\u0641\u0635\u064a\u0644\u0629 \u0627\u0644\u0646\u062c\u064a\u0644\u064a\u0629\u060c \u064a\u062a\u0645\u064a\u0632 \u0628\u0642\u062f\u0631\u062a\u0647 \u0627\u0644\u0639\u0627\u0644\u064a\u0629 \u0639\u0644\u0649 \u062a\u062d\u0645\u0644 \u0627\u0644\u062c\u0641\u0627\u0641 \u0648\u0627\u0644\u062d\u0631\u0627\u0631\u0629 \u0627\u0644\u0639\u0627\u0644\u064a\u0629\u060c \u0648\u064a\u0639\u062f \u062b\u0627\u0644\u062b \u0623\u0647\u0645 \u0645\u062d\u0635\u0648\u0644 \u062d\u0628\u0648\u0628 \u0641\u064a \u0627\u0644\u064a\u0645\u0646 \u0645\u0646 \u062d\u064a\u062b \u0627\u0644\u0645\u0633\u0627\u062d\u0629 \u0648\u0627\u0644\u0625\u0646\u062a\u0627\u062c.\n\n\u0638\u0631\u0648\u0641 \u0627\u0644\u0646\u0645\u0648: \u064a\u0632\u062f\u0647\u0631 \u0641\u064a \u062f\u0